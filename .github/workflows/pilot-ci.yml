name: Pilot CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pilot-ci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Verify v4.0.2 runtime and verifier-pack identity
        env:
          GUARD_SHA256: 7813db5c99f27f780ec31bbaa124b5526405783d1f53caecc32f70aabfbc13c3
        run: |
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$RUNNER_TEMP/evo-guard.pyz" \
            "https://github.com/EvoRiseKsa/EvoOM-Guard-m/releases/download/v4.0.2/evo-guard.pyz"
          printf '%s  %s\n' "$GUARD_SHA256" "$RUNNER_TEMP/evo-guard.pyz" | sha256sum --check --strict
          python -I "$RUNNER_TEMP/evo-guard.pyz" pack-doctor security/evoguard-pack --json > "$RUNNER_TEMP/pack.json"
          python - "$RUNNER_TEMP/pack.json" .evoguard.json <<'PY'
          import json
          import pathlib
          import sys

          observed = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          policy = json.loads(pathlib.Path(sys.argv[2]).read_text(encoding="utf-8"))
          assert observed["ok"] is True, observed
          assert observed["pack_sha256"] == policy["expect_verifier_pack_sha256"]
          PY
      - name: Public fixture and workflow-contract tests
        run: python -m unittest discover -s tests -v
      - name: Install hash-locked Ed25519 verification dependency
        run: |
          python - "$RUNNER_TEMP/finalizer-requirements.txt" <<'PY'
          from pathlib import Path
          import sys

          Path(sys.argv[1]).write_text(
              """cryptography==46.0.7 \
              --hash=sha256:420b1e4109cc95f0e5700eed79908cef9268265c773d3a66f7af1eef53d409ef
          cffi==2.1.0 \
              --hash=sha256:1e9f50d192a3e525b15a75ab5114e442d83d657b7ec29182a991bc9a88fd3a66
          pycparser==3.0 \
              --hash=sha256:b727414169a36b7d524c1c3e31839a521725078d7b2ff038656844266160a992
          """,
              encoding="utf-8",
          )
          PY
          python -m pip install --disable-pip-version-check --only-binary=:all: \
            --require-hashes -r "$RUNNER_TEMP/finalizer-requirements.txt"
      - name: Verify retained Round 1 final bundle
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import pathlib

          source = pathlib.Path("evidence/round1/final-allow.evb.b64")
          target = pathlib.Path("${{ runner.temp }}/final-allow.evb")
          target.write_bytes(base64.b64decode("".join(source.read_text(encoding="ascii").split()), validate=True))
          PY
          python -I "$RUNNER_TEMP/evo-guard.pyz" verify-finalized \
            "$RUNNER_TEMP/final-allow.evb" \
            --trusted-pub security/finalizer-public.pem \
            --expected-source evidence/round1/final-allow-expected-source.json \
            --expected-context evidence/round1/final-allow-expected-context.json \
            --require-pass | tee "$RUNNER_TEMP/round1-verification.json"
          python - "$RUNNER_TEMP/round1-verification.json" <<'PY'
          import json
          import pathlib
          import sys

          result = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          assert result["verified"] is True, result
          assert result["decision"] == "ALLOW", result
          PY
