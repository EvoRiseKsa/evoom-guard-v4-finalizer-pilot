name: EvoGuard Artifact Admission

on:
  workflow_run:
    workflows: ["EvoGuard Artifact Build"]
    types: [completed]

permissions: {}

jobs:
  preflight:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'workflow_dispatch' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      pull-requests: read
    outputs:
      build_run_id: ${{ steps.control.outputs.build_run_id }}
      build_run_attempt: ${{ steps.control.outputs.build_run_attempt }}
      build_workflow_id: ${{ steps.control.outputs.build_workflow_id }}
      subject_artifact_id: ${{ steps.control.outputs.subject_artifact_id }}
      subject_artifact_digest: ${{ steps.control.outputs.subject_artifact_digest }}
      control_artifact_id: ${{ steps.locate.outputs.control_artifact_id }}
      control_artifact_digest: ${{ steps.locate.outputs.control_artifact_digest }}
      pr_number: ${{ steps.control.outputs.pr_number }}
      base_sha: ${{ steps.control.outputs.base_sha }}
      head_sha: ${{ steps.control.outputs.head_sha }}
      source_ref: ${{ steps.control.outputs.source_ref }}
      finalizer_reverify_run_id: ${{ steps.control.outputs.finalizer_reverify_run_id }}
      finalizer_reverify_run_attempt: ${{ steps.control.outputs.finalizer_reverify_run_attempt }}
      finalizer_control_artifact_id: ${{ steps.control.outputs.finalizer_control_artifact_id }}
      finalizer_control_artifact_digest: ${{ steps.control.outputs.finalizer_control_artifact_digest }}
      finalizer_evidence_artifact_id: ${{ steps.control.outputs.finalizer_evidence_artifact_id }}
      finalizer_evidence_artifact_digest: ${{ steps.control.outputs.finalizer_evidence_artifact_digest }}
      finalizer_seal_run_id: ${{ steps.control.outputs.finalizer_seal_run_id }}
      finalizer_seal_run_attempt: ${{ steps.control.outputs.finalizer_seal_run_attempt }}
      finalizer_bundle_artifact_id: ${{ steps.control.outputs.finalizer_bundle_artifact_id }}
      finalizer_bundle_artifact_digest: ${{ steps.control.outputs.finalizer_bundle_artifact_digest }}
    steps:
      - id: locate
        name: Select the exact configured build run and its two artifacts
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          EXPECTED_BUILD_WORKFLOW_ID: ${{ vars.EVOGUARD_ARTIFACT_BUILD_WORKFLOW_ID }}
        with:
          script: |
            const expected = process.env.EXPECTED_BUILD_WORKFLOW_ID || '';
            const run = context.payload.workflow_run;
            if (!/^[1-9][0-9]*$/.test(expected) || String(run.workflow_id) !== expected) {
              throw new Error('workflow_run is not the configured Artifact Build workflow');
            }
            if (run.event !== 'workflow_dispatch' || run.conclusion !== 'success' ||
                run.head_repository?.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              throw new Error('Artifact Build run is not a successful same-repository dispatch');
            }
            const response = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner, repo: context.repo.repo, run_id: run.id, per_page: 100,
            });
            const artifacts = response.data.artifacts.filter((artifact) => !artifact.expired);
            function exactlyOne(name) {
              const matches = artifacts.filter((artifact) => artifact.name === name);
              if (matches.length !== 1) throw new Error(`expected one live build artifact named ${name}`);
              const value = matches[0];
              if (!/^sha256:[0-9a-f]{64}$/.test(value.digest || '')) {
                throw new Error(`build artifact ${name} lacks a canonical API digest`);
              }
              return value;
            }
            const subject = exactlyOne(`evoguard-artifact-subject-v1-${run.run_attempt}`);
            const control = exactlyOne(`evoguard-artifact-build-control-v1-${run.run_attempt}`);
            if (artifacts.length !== 2) throw new Error('unexpected artifact in Artifact Build run');
            core.setOutput('subject_artifact_id', String(subject.id));
            core.setOutput('subject_artifact_digest', subject.digest);
            core.setOutput('control_artifact_id', String(control.id));
            core.setOutput('control_artifact_digest', control.digest);

      - name: Download the exact build control artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ steps.locate.outputs.control_artifact_id }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ${{ runner.temp }}/build-control
          merge-multiple: true
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}

      - id: control
        name: Validate build control and revalidate every referenced finalizer artifact
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CONTROL_DIR: ${{ runner.temp }}/build-control
          EXPECTED_SUBJECT_ARTIFACT_ID: ${{ steps.locate.outputs.subject_artifact_id }}
          EXPECTED_SUBJECT_ARTIFACT_DIGEST: ${{ steps.locate.outputs.subject_artifact_digest }}
          EXPECTED_REVERIFY_WORKFLOW_ID: ${{ vars.EVOGUARD_REVERIFY_WORKFLOW_ID }}
          EXPECTED_SEAL_WORKFLOW_ID: ${{ vars.EVOGUARD_SEAL_WORKFLOW_ID }}
        with:
          script: |
            const crypto = require('crypto');
            const fs = require('fs');
            const path = require('path');
            const { owner, repo } = context.repo;
            const fullName = `${owner}/${repo}`;
            const buildRun = context.payload.workflow_run;
            const controlPath = path.join(process.env.CONTROL_DIR, 'artifact-build-control.json');
            const attestationPath = path.join(process.env.CONTROL_DIR, 'github-attestation.json');
            for (const target of [controlPath, attestationPath]) {
              const stat = fs.lstatSync(target);
              if (!stat.isFile() || stat.size < 1 || stat.size > 16 * 1024 * 1024) {
                throw new Error(`invalid build-control file: ${path.basename(target)}`);
              }
            }
            const bytes = fs.readFileSync(controlPath);
            const control = JSON.parse(bytes.toString('utf8'));
            const top = ['attestation', 'builder', 'finalizer', 'format', 'source', 'subject'];
            if (Object.keys(control).sort().join(',') !== top.join(',') ||
                control.format !== 'EVOGUARD_ARTIFACT_BUILD_CONTROL_V1') {
              throw new Error('unexpected artifact build control schema');
            }
            if (control.builder.run_id !== String(buildRun.id) ||
                control.builder.run_attempt !== buildRun.run_attempt ||
                control.builder.workflow_sha !== buildRun.head_sha ||
                control.source.head_sha !== buildRun.head_sha ||
                control.source.source_ref !== `refs/heads/${buildRun.head_branch}` ||
                control.source.repository !== fullName ||
                control.source.repository_id !== String(context.payload.repository.id)) {
              throw new Error('build control does not bind this workflow run/repository/head');
            }
            if (control.subject.artifact_id !== process.env.EXPECTED_SUBJECT_ARTIFACT_ID ||
                control.subject.artifact_api_digest !== process.env.EXPECTED_SUBJECT_ARTIFACT_DIGEST) {
              throw new Error('build control does not select the exact subject artifact');
            }
            const attestationBytes = fs.readFileSync(attestationPath);
            const attestationSha = crypto.createHash('sha256').update(attestationBytes).digest('hex');
            if (control.attestation.bundle_sha256 !== attestationSha) {
              throw new Error('retained GitHub attestation bundle differs from build control');
            }

            const pr = (await github.rest.pulls.get({
              owner, repo, pull_number: control.source.pull_request_number,
            })).data;
            const main = (await github.rest.repos.getBranch({
              owner, repo, branch: context.payload.repository.default_branch,
            })).data;
            if (context.payload.repository.default_branch !== 'main' || pr.state !== 'open' ||
                pr.base.ref !== 'main' || pr.base.sha !== main.commit.sha ||
                pr.base.sha !== control.source.base_sha || pr.head.sha !== control.source.head_sha ||
                pr.head.ref !== buildRun.head_branch || pr.head.repo?.full_name !== fullName ||
                pr.base.repo?.full_name !== fullName) {
              throw new Error('PR changed or is not the current same-repository main candidate');
            }

            const positive = /^[1-9][0-9]*$/;
            for (const name of ['EXPECTED_REVERIFY_WORKFLOW_ID', 'EXPECTED_SEAL_WORKFLOW_ID']) {
              if (!positive.test(process.env[name] || '')) throw new Error(`${name} is not configured`);
            }
            const finalizer = control.finalizer;
            const reverifyId = Number(finalizer.reverify_run_id);
            const sealId = Number(finalizer.seal_run_id);
            if (!Number.isSafeInteger(reverifyId) || !Number.isSafeInteger(sealId)) {
              throw new Error('build control has invalid finalizer run IDs');
            }
            const [reverify, seal] = await Promise.all([
              github.rest.actions.getWorkflowRun({ owner, repo, run_id: reverifyId }),
              github.rest.actions.getWorkflowRun({ owner, repo, run_id: sealId }),
            ]);
            const a = reverify.data;
            const b = seal.data;
            if (String(a.workflow_id) !== process.env.EXPECTED_REVERIFY_WORKFLOW_ID ||
                a.event !== 'workflow_dispatch' || a.conclusion !== 'success' ||
                a.run_attempt !== finalizer.reverify_run_attempt || a.head_sha !== pr.base.sha ||
                a.head_branch !== 'main' || a.head_repository?.full_name !== fullName) {
              throw new Error('referenced Reverify run is not the exact configured successful run');
            }
            if (String(b.workflow_id) !== process.env.EXPECTED_SEAL_WORKFLOW_ID ||
                b.event !== 'workflow_run' || b.conclusion !== 'success' ||
                b.run_attempt !== finalizer.seal_run_attempt || b.head_sha !== pr.base.sha ||
                String(b.workflow_id) !== finalizer.seal_workflow_id ||
                b.head_sha !== finalizer.seal_head_sha || b.head_repository?.full_name !== fullName) {
              throw new Error('referenced Seal run is not the exact configured successful run');
            }

            async function exactArtifact(id, digest, runId) {
              if (!positive.test(String(id)) || !/^sha256:[0-9a-f]{64}$/.test(digest || '')) {
                throw new Error('invalid referenced finalizer artifact selector');
              }
              const artifact = (await github.rest.actions.getArtifact({
                owner, repo, artifact_id: Number(id),
              })).data;
              if (artifact.expired || artifact.digest !== digest || artifact.workflow_run?.id !== runId) {
                throw new Error('referenced finalizer artifact changed, expired, or belongs to another run');
              }
              return artifact;
            }
            await Promise.all([
              exactArtifact(finalizer.reverify_control_artifact_id,
                finalizer.reverify_control_artifact_api_digest, reverifyId),
              exactArtifact(finalizer.reverify_evidence_artifact_id,
                finalizer.reverify_evidence_artifact_api_digest, reverifyId),
              exactArtifact(finalizer.bundle_artifact_id,
                finalizer.bundle_artifact_api_digest, sealId),
            ]);

            const outputs = {
              build_run_id: String(buildRun.id),
              build_run_attempt: String(buildRun.run_attempt),
              build_workflow_id: String(buildRun.workflow_id),
              subject_artifact_id: control.subject.artifact_id,
              subject_artifact_digest: control.subject.artifact_api_digest,
              pr_number: String(control.source.pull_request_number),
              base_sha: control.source.base_sha,
              head_sha: control.source.head_sha,
              source_ref: control.source.source_ref,
              finalizer_reverify_run_id: finalizer.reverify_run_id,
              finalizer_reverify_run_attempt: String(finalizer.reverify_run_attempt),
              finalizer_control_artifact_id: finalizer.reverify_control_artifact_id,
              finalizer_control_artifact_digest: finalizer.reverify_control_artifact_api_digest,
              finalizer_evidence_artifact_id: finalizer.reverify_evidence_artifact_id,
              finalizer_evidence_artifact_digest: finalizer.reverify_evidence_artifact_api_digest,
              finalizer_seal_run_id: finalizer.seal_run_id,
              finalizer_seal_run_attempt: String(finalizer.seal_run_attempt),
              finalizer_bundle_artifact_id: finalizer.bundle_artifact_id,
              finalizer_bundle_artifact_digest: finalizer.bundle_artifact_api_digest,
            };
            for (const [name, value] of Object.entries(outputs)) core.setOutput(name, value);

  admit:
    needs: preflight
    if: needs.preflight.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    environment: evoguard-artifact-admission
    permissions:
      actions: read
      attestations: read
      contents: read
      pull-requests: read
    steps:
      - name: Revalidate live selectors after protected Environment approval
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BUILD_RUN_ID: ${{ needs.preflight.outputs.build_run_id }}
          BUILD_RUN_ATTEMPT: ${{ needs.preflight.outputs.build_run_attempt }}
          EXPECTED_HEAD_SHA: ${{ needs.preflight.outputs.head_sha }}
          EXPECTED_SOURCE_REF: ${{ needs.preflight.outputs.source_ref }}
          GITHUB_REPOSITORY_ID: ${{ github.event.repository.id }}
          BUILD_WORKFLOW_ID: ${{ needs.preflight.outputs.build_workflow_id }}
          PR_NUMBER: ${{ needs.preflight.outputs.pr_number }}
          BASE_SHA: ${{ needs.preflight.outputs.base_sha }}
          HEAD_SHA: ${{ needs.preflight.outputs.head_sha }}
          SOURCE_REF: ${{ needs.preflight.outputs.source_ref }}
          SUBJECT_ARTIFACT_ID: ${{ needs.preflight.outputs.subject_artifact_id }}
          SUBJECT_ARTIFACT_DIGEST: ${{ needs.preflight.outputs.subject_artifact_digest }}
          CONTROL_ARTIFACT_ID: ${{ needs.preflight.outputs.control_artifact_id }}
          CONTROL_ARTIFACT_DIGEST: ${{ needs.preflight.outputs.control_artifact_digest }}
          FINALIZER_CONTROL_ARTIFACT_ID: ${{ needs.preflight.outputs.finalizer_control_artifact_id }}
          FINALIZER_CONTROL_ARTIFACT_DIGEST: ${{ needs.preflight.outputs.finalizer_control_artifact_digest }}
          FINALIZER_EVIDENCE_ARTIFACT_ID: ${{ needs.preflight.outputs.finalizer_evidence_artifact_id }}
          FINALIZER_EVIDENCE_ARTIFACT_DIGEST: ${{ needs.preflight.outputs.finalizer_evidence_artifact_digest }}
          FINALIZER_BUNDLE_ARTIFACT_ID: ${{ needs.preflight.outputs.finalizer_bundle_artifact_id }}
          FINALIZER_BUNDLE_ARTIFACT_DIGEST: ${{ needs.preflight.outputs.finalizer_bundle_artifact_digest }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const fullName = `${owner}/${repo}`;
            const run = (await github.rest.actions.getWorkflowRun({
              owner, repo, run_id: Number(process.env.BUILD_RUN_ID),
            })).data;
            if (String(run.workflow_id) !== process.env.BUILD_WORKFLOW_ID ||
                run.run_attempt !== Number(process.env.BUILD_RUN_ATTEMPT) ||
                run.event !== 'workflow_dispatch' || run.conclusion !== 'success' ||
                run.head_sha !== process.env.HEAD_SHA ||
                `refs/heads/${run.head_branch}` !== process.env.SOURCE_REF ||
                run.head_repository?.full_name !== fullName) {
              throw new Error('Artifact Build run changed before protected admission');
            }
            const pr = (await github.rest.pulls.get({
              owner, repo, pull_number: Number(process.env.PR_NUMBER),
            })).data;
            const main = (await github.rest.repos.getBranch({ owner, repo, branch: 'main' })).data;
            if (pr.state !== 'open' || pr.base.sha !== main.commit.sha ||
                pr.base.sha !== process.env.BASE_SHA || pr.head.sha !== process.env.HEAD_SHA ||
                pr.head.repo?.full_name !== fullName) {
              throw new Error('PR changed while admission awaited protected approval');
            }
            const selectors = [
              ['SUBJECT_ARTIFACT_ID', 'SUBJECT_ARTIFACT_DIGEST'],
              ['CONTROL_ARTIFACT_ID', 'CONTROL_ARTIFACT_DIGEST'],
              ['FINALIZER_CONTROL_ARTIFACT_ID', 'FINALIZER_CONTROL_ARTIFACT_DIGEST'],
              ['FINALIZER_EVIDENCE_ARTIFACT_ID', 'FINALIZER_EVIDENCE_ARTIFACT_DIGEST'],
              ['FINALIZER_BUNDLE_ARTIFACT_ID', 'FINALIZER_BUNDLE_ARTIFACT_DIGEST'],
            ];
            for (const [idName, digestName] of selectors) {
              const artifact = (await github.rest.actions.getArtifact({
                owner, repo, artifact_id: Number(process.env[idName]),
              })).data;
              if (artifact.expired || artifact.digest !== process.env[digestName]) {
                throw new Error(`artifact selector changed before admission: ${idName}`);
              }
            }

      - name: Download the exact attested subject
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.preflight.outputs.subject_artifact_id }}
          run-id: ${{ needs.preflight.outputs.build_run_id }}
          path: ${{ runner.temp }}/subject
          merge-multiple: true
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}
      - name: Download the exact builder audit control
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.preflight.outputs.control_artifact_id }}
          run-id: ${{ needs.preflight.outputs.build_run_id }}
          path: ${{ runner.temp }}/build-control
          merge-multiple: true
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}
      - name: Download the exact finalizer control
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.preflight.outputs.finalizer_control_artifact_id }}
          run-id: ${{ needs.preflight.outputs.finalizer_reverify_run_id }}
          path: ${{ runner.temp }}/finalizer-control
          merge-multiple: true
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}
      - name: Download the exact finalizer evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.preflight.outputs.finalizer_evidence_artifact_id }}
          run-id: ${{ needs.preflight.outputs.finalizer_reverify_run_id }}
          path: ${{ runner.temp }}/finalizer-evidence
          merge-multiple: true
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}
      - name: Download the exact signed finalizer bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.preflight.outputs.finalizer_bundle_artifact_id }}
          run-id: ${{ needs.preflight.outputs.finalizer_seal_run_id }}
          path: ${{ runner.temp }}/finalizer-bundle
          merge-multiple: true
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}

      - name: Set up the admission verification runtime
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install hash-locked Ed25519 verification dependencies
        run: |
          set -euo pipefail
          python - "$RUNNER_TEMP/admission-requirements.txt" <<'PY'
          from pathlib import Path
          import sys
          Path(sys.argv[1]).write_text(
              """cryptography==46.0.7 \\
              --hash=sha256:420b1e4109cc95f0e5700eed79908cef9268265c773d3a66f7af1eef53d409ef
          cffi==2.1.0 \\
              --hash=sha256:1e9f50d192a3e525b15a75ab5114e442d83d657b7ec29182a991bc9a88fd3a66
          pycparser==3.0 \\
              --hash=sha256:b727414169a36b7d524c1c3e31839a521725078d7b2ff038656844266160a992
          """,
              encoding="utf-8",
          )
          PY
          python -m pip install --disable-pip-version-check --only-binary=:all: \
            --require-hashes -r "$RUNNER_TEMP/admission-requirements.txt"

      - name: Install the reviewed Guard and GitHub CLI runtimes by exact digest
        run: |
          set -euo pipefail
          printf '%s  %s\n' \
            '7813db5c99f27f780ec31bbaa124b5526405783d1f53caecc32f70aabfbc13c3' \
            "$RUNNER_TEMP/evo-guard.pyz" > "$RUNNER_TEMP/guard.sha256"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$RUNNER_TEMP/evo-guard.pyz" \
            'https://github.com/EvoRiseKsa/EvoOM-Guard-m/releases/download/v4.0.2/evo-guard.pyz'
          sha256sum --check "$RUNNER_TEMP/guard.sha256"
          chmod 0755 "$RUNNER_TEMP/evo-guard.pyz"

          archive="$RUNNER_TEMP/gh_2.90.0_linux_amd64.tar.gz"
          printf '%s  %s\n' \
            'b2aef7b23ec6899bf27f37a32c57a7935d0a178568ac33dc9bb03842f724195a' \
            "$archive" > "$RUNNER_TEMP/gh.sha256"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$archive" \
            'https://github.com/cli/cli/releases/download/v2.90.0/gh_2.90.0_linux_amd64.tar.gz'
          sha256sum --check "$RUNNER_TEMP/gh.sha256"
          python - "$archive" "$RUNNER_TEMP" <<'PY'
          import pathlib
          import sys
          import tarfile
          archive, target = sys.argv[1:]
          prefix = "gh_2.90.0_linux_amd64/"
          with tarfile.open(archive, "r:gz") as source:
              members = source.getmembers()
              if not members or any(
                  not member.name.startswith(prefix)
                  or member.name.startswith("/")
                  or ".." in pathlib.PurePosixPath(member.name).parts
                  or not (member.isfile() or member.isdir())
                  or member.size > 256 * 1024 * 1024
                  for member in members
              ):
                  raise SystemExit("refuse unexpected GitHub CLI archive layout")
              source.extractall(target, filter="data")
          PY
          test "$("$RUNNER_TEMP/gh_2.90.0_linux_amd64/bin/gh" --version | awk 'NR==1 {print $3}')" = '2.90.0'

      - id: proof
        name: Re-derive finalizer bindings and freeze exact admission policy
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.preflight.outputs.pr_number }}
          BASE_SHA: ${{ needs.preflight.outputs.base_sha }}
          HEAD_SHA: ${{ needs.preflight.outputs.head_sha }}
          SOURCE_REF: ${{ needs.preflight.outputs.source_ref }}
          FINALIZER_REVERIFY_RUN_ID: ${{ needs.preflight.outputs.finalizer_reverify_run_id }}
          FINALIZER_REVERIFY_RUN_ATTEMPT: ${{ needs.preflight.outputs.finalizer_reverify_run_attempt }}
          BUILD_RUN_ID: ${{ needs.preflight.outputs.build_run_id }}
          BUILD_RUN_ATTEMPT: ${{ needs.preflight.outputs.build_run_attempt }}
        run: |
          set -euo pipefail
          python - "$RUNNER_TEMP" <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path
          import stat
          import sys

          root = Path(sys.argv[1])
          paths = {
              "subject": (root / "subject" / "calc-source-artifact.json", 1024 * 1024),
              "build_control": (root / "build-control" / "artifact-build-control.json", 1024 * 1024),
              "attestation": (root / "build-control" / "github-attestation.json", 16 * 1024 * 1024),
              "finalizer_control": (root / "finalizer-control" / "finalizer-control.json", 16 * 1024),
              "verdict": (root / "finalizer-evidence" / "verdict.json", 16 * 1024 * 1024),
              "handoff": (root / "finalizer-evidence" / "handoff.json", 16 * 1024 * 1024),
              "finalized": (root / "finalizer-bundle" / "finalized.evb", 32 * 1024 * 1024),
          }
          for label, (path, maximum) in paths.items():
              info = path.lstat()
              if not stat.S_ISREG(info.st_mode) or not 0 < info.st_size <= maximum:
                  raise SystemExit(f"invalid bounded regular {label} file")
          control_bytes = paths["build_control"][0].read_bytes()
          control = json.loads(control_bytes)
          subject = paths["subject"][0].read_bytes()
          if hashlib.sha256(subject).hexdigest() != control["subject"]["sha256"] or \
                  len(subject) != control["subject"]["size"]:
              raise SystemExit("downloaded subject bytes differ from builder control")
          retained = paths["attestation"][0].read_bytes()
          if hashlib.sha256(retained).hexdigest() != control["attestation"]["bundle_sha256"]:
              raise SystemExit("retained GitHub attestation bytes differ from builder control")
          finalizer_control = json.loads(paths["finalizer_control"][0].read_bytes())
          expected = {
              "base_sha": os.environ["BASE_SHA"],
              "head_sha": os.environ["HEAD_SHA"],
              "pull_request_number": int(os.environ["PR_NUMBER"]),
              "repository": os.environ["GITHUB_REPOSITORY"],
