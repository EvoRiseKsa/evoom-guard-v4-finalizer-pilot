          import re
          import sys
          raw = json.load(open(sys.argv[1], encoding="utf-8"))
          cert = raw[0]["verificationResult"]["signature"]["certificate"]
          normalized = {re.sub(r"[^a-z]", "", key.lower()): value for key, value in cert.items()}
          wrong = (
              f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
              f"{int(os.environ['BUILD_RUN_ID']) + 1}/attempts/{os.environ['BUILD_RUN_ATTEMPT']}"
          )
          if normalized.get("runinvocationuri") != wrong:
              raise SystemExit("expected negative: certificate does not bind the wrong build run")
          PY
          codes[wrong_build_run]=$?
          set -e
          for name in "${!codes[@]}"; do
            test "${codes[$name]}" -ne 0 || { echo "negative unexpectedly passed: $name" >&2; exit 1; }
          done
          sha256sum "${originals[@]}" > "$RUNNER_TEMP/original-evidence.after.sha256"
          cmp "$RUNNER_TEMP/original-evidence.before.sha256" "$RUNNER_TEMP/original-evidence.after.sha256"
          NEGATIVE_CODES="$(for name in "${!codes[@]}"; do printf '%s=%s\n' "$name" "${codes[$name]}"; done | sort)" \
            python - "$RUNNER_TEMP/negative-controls.json" <<'PY'
          import json
          import os
          import sys
          path = sys.argv[1]
          exits = {}
          for line in os.environ["NEGATIVE_CODES"].splitlines():
              name, value = line.split("=", 1)
              exits[name] = int(value)
          with open(path, "x", encoding="utf-8", newline="\n") as target:
              json.dump({
                  "format": "EVOGUARD_ARTIFACT_ADMISSION_NEGATIVES_V1",
                  "original_evidence_unchanged": True,
                  "rejected_cases": exits,
              }, target, sort_keys=True, separators=(",", ":"))
              target.write("\n")
          PY

      - name: Write a machine-checkable public evidence index
        env:
          BUILD_RUN_ID: ${{ needs.preflight.outputs.build_run_id }}
          BUILD_RUN_ATTEMPT: ${{ needs.preflight.outputs.build_run_attempt }}
          PR_NUMBER: ${{ needs.preflight.outputs.pr_number }}
          BASE_SHA: ${{ needs.preflight.outputs.base_sha }}
          HEAD_SHA: ${{ needs.preflight.outputs.head_sha }}
          SOURCE_REF: ${{ needs.preflight.outputs.source_ref }}
          FINALIZER_REVERIFY_RUN_ID: ${{ needs.preflight.outputs.finalizer_reverify_run_id }}
          FINALIZER_REVERIFY_RUN_ATTEMPT: ${{ needs.preflight.outputs.finalizer_reverify_run_attempt }}
          FINALIZER_SEAL_RUN_ID: ${{ needs.preflight.outputs.finalizer_seal_run_id }}
          FINALIZER_SEAL_RUN_ATTEMPT: ${{ needs.preflight.outputs.finalizer_seal_run_attempt }}
        run: |
          set -euo pipefail
          test ! -e "$RUNNER_TEMP/artifact-admission-private.pem"
          "$RUNNER_TEMP/gh_2.90.0_linux_amd64/bin/gh" --version > "$RUNNER_TEMP/gh-version.txt"
          python -I "$RUNNER_TEMP/evo-guard.pyz" version > "$RUNNER_TEMP/guard-version.txt"
          python - "$RUNNER_TEMP" <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path
          import stat
          import sys

          root = Path(sys.argv[1])
          names = [
              "artifact-admission.eab",
              "artifact-admission-public.pem",
              "build-control/artifact-build-control.json",
              "build-control/github-attestation.json",
              "certificate-binding.json",
              "derived-finalizer-bindings.json",
              "expected-finalizer-context.json",
              "expected-finalizer-source.json",
              "finalizer-bundle/finalized.evb",
              "finalizer-control/finalizer-control.json",
              "finalizer-evidence/handoff.json",
              "finalizer-evidence/verdict.json",
              "finalizer-public.pem",
              "fresh-provider-reverify-report.json",
              "gh.sha256",
              "gh-version.txt",
              "github-attestation.raw.json",
              "github-attestation.receipt.json",
              "guard.sha256",
              "guard-version.txt",
              "negative-controls.json",
              "prekey-attestation.raw.json",
              "prekey-attestation.receipt.json",
              "prekey-provider-report.json",
              "retained-verify-report.json",
              "seal-report.json",
              "subject/calc-source-artifact.json",
          ]
          lines = []
          for name in names:
              path = root / name
              info = path.lstat()
              if not stat.S_ISREG(info.st_mode) or info.st_size < 1:
                  raise SystemExit(f"missing public evidence file: {name}")
              lines.append(f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {name}")
          (root / "SHA256SUMS").write_text("\n".join(lines) + "\n", encoding="ascii")
          observation = {
              "admission_key_id": "sha256:cd9db360e786c0f4c5d31881a5953152bb773a86ee9d3716721dbf01658b357b",
              "base_sha": os.environ["BASE_SHA"],
              "build_run_attempt": int(os.environ["BUILD_RUN_ATTEMPT"]),
              "build_run_id": os.environ["BUILD_RUN_ID"],
              "claim_boundary": (
                  "one regular-file SHA/size freshly verified under an exact GitHub attestation "
                  "signer/source policy and bound to a same-head Trusted Finalizer ALLOW; not "
                  "reproducibility, safety, release, deployment, OCI, production, or independent audit"
              ),
              "finalizer_key_id": "sha256:e5ca8d43c4816900ed42b81b52cbd65a6c42105b1bdfaa00a6c100462d70faf0",
              "finalizer_reverify_run_attempt": int(os.environ["FINALIZER_REVERIFY_RUN_ATTEMPT"]),
              "finalizer_reverify_run_id": os.environ["FINALIZER_REVERIFY_RUN_ID"],
              "finalizer_seal_run_attempt": int(os.environ["FINALIZER_SEAL_RUN_ATTEMPT"]),
              "finalizer_seal_run_id": os.environ["FINALIZER_SEAL_RUN_ID"],
              "format": "EVOGUARD_ARTIFACT_ADMISSION_OBSERVATION_V1",
              "guard_runtime_sha256": "7813db5c99f27f780ec31bbaa124b5526405783d1f53caecc32f70aabfbc13c3",
              "head_sha": os.environ["HEAD_SHA"],
              "pr_number": int(os.environ["PR_NUMBER"]),
              "repository": os.environ["GITHUB_REPOSITORY"],
              "signer_digest": "8083c3763e3472ff8616bd645b016ad0779da91d",
              "signer_workflow": (
                  "EvoRiseKsa/evoom-guard-v4-finalizer-pilot/"
                  ".github/workflows/trusted-artifact-builder.yml"
              ),
              "source_ref": os.environ["SOURCE_REF"],
          }
          (root / "OBSERVATION.json").write_text(
              json.dumps(observation, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Preserve public Artifact Admission evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: evoguard-artifact-admission-evidence-${{ needs.preflight.outputs.build_run_id }}
          path: |
            ${{ runner.temp }}/artifact-admission.eab
            ${{ runner.temp }}/github-attestation.receipt.json
            ${{ runner.temp }}/github-attestation.raw.json
            ${{ runner.temp }}/prekey-attestation.receipt.json
            ${{ runner.temp }}/prekey-attestation.raw.json
            ${{ runner.temp }}/prekey-provider-report.json
            ${{ runner.temp }}/seal-report.json
            ${{ runner.temp }}/retained-verify-report.json
            ${{ runner.temp }}/fresh-provider-reverify-report.json
            ${{ runner.temp }}/negative-controls.json
            ${{ runner.temp }}/negative-*.json
            ${{ runner.temp }}/certificate-binding.json
            ${{ runner.temp }}/artifact-admission-public.pem
            ${{ runner.temp }}/finalizer-public.pem
            ${{ runner.temp }}/guard.sha256
            ${{ runner.temp }}/gh.sha256
            ${{ runner.temp }}/guard-version.txt
            ${{ runner.temp }}/gh-version.txt
            ${{ runner.temp }}/OBSERVATION.json
            ${{ runner.temp }}/SHA256SUMS
            ${{ runner.temp }}/expected-finalizer-source.json
            ${{ runner.temp }}/expected-finalizer-context.json
            ${{ runner.temp }}/derived-finalizer-bindings.json
            ${{ runner.temp }}/subject/calc-source-artifact.json
            ${{ runner.temp }}/build-control/artifact-build-control.json
            ${{ runner.temp }}/build-control/github-attestation.json
            ${{ runner.temp }}/finalizer-control/finalizer-control.json
            ${{ runner.temp }}/finalizer-evidence/verdict.json
            ${{ runner.temp }}/finalizer-evidence/handoff.json
            ${{ runner.temp }}/finalizer-bundle/finalized.evb
          if-no-files-found: warn
          compression-level: 0
          overwrite: false
          retention-days: 90
